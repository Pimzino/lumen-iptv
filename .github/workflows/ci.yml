name: CI

# Continuous integration: restore, build (warnings-as-errors), and run the test
# suite on every push and pull request to main. This is what backs the "tests"
# badge in the README. Packaging/releases live in release.yml.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - 'NOTICE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - 'NOTICE'
  workflow_dispatch:

permissions:
  contents: read

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET SDK (pinned by global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Build & test
        run: ./build.ps1 -Configuration Release
